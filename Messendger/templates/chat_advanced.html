<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мессенджер - Расширенная версия</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/emoji-mart/5.5.2/css/emoji-mart.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/emoji-mart/5.5.2/emoji-mart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Темная тема */
        body.dark-theme {
            background: #1a1a2e;
        }

        body.dark-theme .sidebar,
        body.dark-theme .chat-header,
        body.dark-theme .input-area,
        body.dark-theme .message-content,
        body.dark-theme .login-box,
        body.dark-theme .user-item,
        body.dark-theme .call-notification {
            background: #16213e;
            color: #eee;
        }

        body.dark-theme .message-content {
            background: #0f3460;
            color: #eee;
        }

        body.dark-theme .message.own .message-content {
            background: #533483;
        }

        body.dark-theme .user-item {
            background: #1a1a2e;
        }

        body.dark-theme .input-area input {
            background: #0f3460;
            color: #eee;
            border-color: #533483;
        }

        body.dark-theme .tool-btn {
            background: #0f3460;
            color: #eee;
        }

        body.light-theme {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body.light-theme .sidebar,
        body.light-theme .chat-header,
        body.light-theme .input-area,
        body.light-theme .login-box {
            background: white;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Боковая панель */
        .sidebar {
            width: 300px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .user-info {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .user-info h3 { margin-bottom: 5px; }

        .theme-toggle {
            margin-top: 10px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            cursor: pointer;
        }

        .users-list {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .users-list h4 { margin-bottom: 15px; }

        .user-item {
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.3s;
        }

        .user-item:hover { background: #e8eaf6; }
        body.dark-theme .user-item:hover { background: #1f3460; }

        .user-name { display: flex; align-items: center; gap: 8px; }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #4caf50;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        .unread-badge {
            background: #f44336;
            color: white;
            border-radius: 50%;
            padding: 2px 6px;
            font-size: 10px;
            font-weight: bold;
        }

        .invite-btn {
            background: #ff9800;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Поиск */
        .search-box {
            padding: 10px 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .search-box input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }

        .search-results {
            position: absolute;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        /* Основная область */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-header h2 { font-size: 18px; }

        .pinned-messages {
            background: #fff3e0;
            padding: 10px 20px;
            border-bottom: 1px solid #e0e0e0;
            font-size: 12px;
        }

        body.dark-theme .pinned-messages { background: #2a1f3d; }

        .pinned-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 5px 0;
        }

        .unpin-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: #999;
        }

        .typing-indicator {
            font-size: 12px;
            color: #999;
            padding: 5px 20px;
            display: none;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.system { justify-content: center; }
        .message.system .message-content {
            background: #e0e0e0;
            color: #666;
            font-size: 12px;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .message-content {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            position: relative;
        }

        .message.own .message-content {
            background: #667eea;
            color: white;
            margin-left: auto;
        }

        .reply-indicator {
            font-size: 11px;
            color: #999;
            margin-bottom: 5px;
            padding-left: 10px;
            border-left: 3px solid #ff9800;
        }

        .message-actions {
            position: absolute;
            right: 10px;
            top: -20px;
            display: none;
            gap: 5px;
            background: white;
            padding: 5px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .message:hover .message-actions { display: flex; }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 12px;
            padding: 2px 5px;
            border-radius: 10px;
        }

        .action-btn:hover { background: #f0f0f0; }

        .audio-message {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        audio { max-width: 200px; }

        .file-message {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 10px;
            cursor: pointer;
        }

        body.dark-theme .file-message { background: #0f3460; }

        /* Область ввода */
        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .input-tools {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .tool-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 16px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .input-row input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 25px;
            outline: none;
        }

        .input-row button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        .record-btn.recording {
            background: #f44336;
            animation: pulse 1s infinite;
        }

        /* Drag & Drop */
        .drag-over { border: 2px dashed #667eea; background: rgba(102, 126, 234, 0.1); }

        /* Окно входа */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 350px;
            text-align: center;
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
        }

        .login-box button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
        }

        .error { color: #f44336; font-size: 12px; margin-top: 10px; }

        /* Уведомления */
        .call-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border-radius: 15px;
            padding: 15px 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .call-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .accept-btn, .decline-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .accept-btn { background: #4caf50; color: white; }
        .decline-btn { background: #f44336; color: white; }
    </style>
</head>
<body class="light-theme">
    <div id="login-container" class="login-container">
        <div class="login-box">
            <h2>💬 Мессенджер</h2>
            <input type="text" id="username" placeholder="Ваше имя">
            <button onclick="joinChat()">Войти в чат</button>
            <div id="login-error" class="error"></div>
        </div>
    </div>

    <div id="chat-container" style="display: none;">
        <div class="container">
            <div class="sidebar">
                <div class="user-info">
                    <h3 id="current-username"></h3>
                    <div class="user-status">🟢 Онлайн</div>
                    <button class="theme-toggle" onclick="toggleTheme()">🌙 Темная тема</button>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Поиск сообщений..." onkeyup="searchMessages()">
                    <div id="searchResults" class="search-results"></div>
                </div>
                <div class="users-list">
                    <h4>👥 Пользователи онлайн</h4>
                    <div id="users-list"></div>
                </div>
            </div>
            <div class="chat-area">
                <div class="chat-header">
                    <h2 id="chatTitle">💬 Общий чат</h2>
                    <button id="leavePrivateBtn" class="leave-private-btn" onclick="leavePrivateChat()" style="display:none; background:#f44336; color:white; border:none; padding:8px 16px; border-radius:20px; cursor:pointer;">🚪 Выйти</button>
                </div>
                <div id="pinnedMessages" class="pinned-messages" style="display:none;"></div>
                <div class="typing-indicator" id="typingIndicator"></div>
                <div class="messages" id="messages"></div>
                <div class="input-area">
                    <div class="input-tools">
                        <button class="tool-btn" onclick="toggleEmojiPicker()">😊</button>
                        <button class="tool-btn" onclick="document.getElementById('fileInput').click()">📎</button>
                        <button id="recordBtn" class="tool-btn" onclick="toggleRecording()">🎤</button>
                        <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)">
                        <div id="emojiPicker" style="display:none; position:absolute; bottom:80px; left:20px; z-index:1000;"></div>
                    </div>
                    <div class="input-row">
                        <input type="text" id="message-input" placeholder="Введите сообщение...">
                        <button onclick="sendMessage()">Отправить</button>
                    </div>
                    <audio id="audioPreview" style="display:none;"></audio>
                </div>
            </div>
        </div>
    </div>

    <script>
        let socket = null;
        let currentUser = null;
        let privateChatWith = null;
        let currentPrivateRoom = null;
        let typingTimeout = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let isRecording = false;
        let emojiPicker = null;
        let replyToMessage = null;

        // Темная тема
        function toggleTheme() {
            const body = document.body;
            if (body.classList.contains('light-theme')) {
                body.classList.remove('light-theme');
                body.classList.add('dark-theme');
                localStorage.setItem('theme', 'dark');
                document.querySelector('.theme-toggle').innerHTML = '☀️ Светлая тема';
            } else {
                body.classList.remove('dark-theme');
                body.classList.add('light-theme');
                localStorage.setItem('theme', 'light');
                document.querySelector('.theme-toggle').innerHTML = '🌙 Темная тема';
            }
        }

        // Загрузка сохраненной темы
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') toggleTheme();

        // Поиск сообщений
        async function searchMessages() {
            const query = document.getElementById('searchInput').value.trim();
            if (query.length < 2) {
                document.getElementById('searchResults').style.display = 'none';
                return;
            }

            const response = await fetch(`/search_messages?q=${encodeURIComponent(query)}&room=${currentPrivateRoom || 'general'}`);
            const data = await response.json();
            
            if (data.results.length > 0) {
                const resultsDiv = document.getElementById('searchResults');
                resultsDiv.innerHTML = data.results.map(msg => 
                    `<div style="padding:8px; border-bottom:1px solid #ddd; cursor:pointer;" onclick="scrollToMessage('${msg.timestamp}')">
                        <strong>${msg.username}</strong>: ${msg.message.substring(0,50)}...
                        <small>${msg.timestamp}</small>
                    </div>`
                ).join('');
                resultsDiv.style.display = 'block';
                setTimeout(() => resultsDiv.style.display = 'none', 5000);
            }
        }

        // Запись аудио
        async function toggleRecording() {
            if (!isRecording) {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.ondataavailable = (event) => {
                        audioChunks.push(event.data);
                    };
                    
                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                        await uploadAudio(audioBlob);
                        stream.getTracks().forEach(track => track.stop());
                    };
                    
                    mediaRecorder.start();
                    isRecording = true;
                    document.getElementById('recordBtn').classList.add('recording');
                    document.getElementById('recordBtn').innerHTML = '⏹️';
                } catch (err) {
                    console.error('Ошибка доступа к микрофону:', err);
                    alert('Нет доступа к микрофону');
                }
            } else {
                mediaRecorder.stop();
                isRecording = false;
                document.getElementById('recordBtn').classList.remove('recording');
                document.getElementById('recordBtn').innerHTML = '🎤';
            }
        }

        async function uploadAudio(blob) {
            const formData = new FormData();
            formData.append('file', blob, `audio_${Date.now()}.webm`);
            formData.append('username', currentUser);
            formData.append('room', currentPrivateRoom || 'general');
            
            const response = await fetch('/upload', { method: 'POST', body: formData });
            const data = await response.json();
            if (!data.success) console.error('Ошибка загрузки аудио');
        }

        // Отправка файлов
        async function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const formData = new FormData();
            formData.append('file', file);
            formData.append('username', currentUser);
            formData.append('room', currentPrivateRoom || 'general');
            
            const response = await fetch('/upload', { method: 'POST', body: formData });
            const data = await response.json();
            if (!data.success) alert('Ошибка загрузки файла');
            event.target.value = '';
        }

        // Закрепление сообщения
        function pinMessage(message) {
            socket.emit('pin_message', {
                username: currentUser,
                message: message,
                room: currentPrivateRoom || 'general'
            });
        }

        // Ответ на сообщение
        function replyTo(msg) {
            replyToMessage = msg;
            const input = document.getElementById('message-input');
            input.placeholder = `Ответ ${msg.username}: ${msg.message.substring(0,30)}...`;
            input.focus();
        }

        function joinChat() {
            const username = document.getElementById('username').value.trim();
            if (!username) {
                document.getElementById('login-error').innerText = 'Введите имя';
                return;
            }
            
            currentUser = username;
            socket = io();
            
            socket.on('connect', () => socket.emit('join', { username, room: 'general' }));
            
            socket.on('joined', (data) => {
                document.getElementById('login-container').style.display = 'none';
                document.getElementById('chat-container').style.display = 'flex';
                document.getElementById('current-username').textContent = currentUser;
                data.messages.forEach(msg => addMessage(msg));
                updateUnreadCounts(data.unread);
                if (data.pinned) data.pinned.forEach(msg => addPinnedMessage(msg));
            });
            
            socket.on('new_message', (data) => addMessage(data));
            socket.on('private_message', (data) => addMessage({...data, isPrivate: true}));
            socket.on('private_message_sent', (data) => addMessage({...data, isPrivate: true, isOwn: true}));
            socket.on('system_message', (data) => addSystemMessage(data.message));
            socket.on('user_joined', (data) => { updateUsersList(data.users); addSystemMessage(`${data.username} присоединился`); });
            socket.on('user_left', (data) => { updateUsersList(data.users); addSystemMessage(`${data.username} покинул чат`); });
            socket.on('typing_update', (data) => updateTypingIndicator(data.users));
            socket.on('message_pinned', (data) => addPinnedMessage(data.message));
            socket.on('message_unpinned', (data) => removePinnedMessage(data.message_id));
            socket.on('call_incoming', (data) => showCallNotification(data.from, data.room));
            socket.on('call_accepted', (data) => startPrivateChat(data.partner, data.room));
            socket.on('call_declined', (data) => addSystemMessage(data.message));
            socket.on('partner_left', (data) => { addSystemMessage(data.message); setTimeout(() => leavePrivateChat(), 2000); });
            socket.on('left_private', (data) => { privateChatWith = null; currentPrivateRoom = null; document.getElementById('chatTitle').innerHTML = '💬 Общий чат'; document.getElementById('leavePrivateBtn').style.display = 'none'; addSystemMessage(data.message); });
            socket.on('error', (data) => document.getElementById('login-error').innerText = data.message);
            socket.on('unread_update', (data) => updateUnreadCountForUser(data.from, data.count));
            
            document.getElementById('message-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
            document.getElementById('message-input').addEventListener('input', () => handleTyping());
            
            // Drag & drop
            const chatArea = document.getElementById('chat-container');
            chatArea.addEventListener('dragover', (e) => e.preventDefault());
            chatArea.addEventListener('drop', async (e) => {
                e.preventDefault();
                const file = e.dataTransfer.files[0];
                if (file) {
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('username', currentUser);
                    formData.append('room', currentPrivateRoom || 'general');
                    await fetch('/upload', { method: 'POST', body: formData });
                }
            });
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message) return;
            
            socket.emit('send_message', { 
                message: message, 
                target: privateChatWith,
                reply_to: replyToMessage
            });
            input.value = '';
            replyToMessage = null;
            input.placeholder = 'Введите сообщение...';
        }

        function handleTyping() {
            socket.emit('typing_start', { username: currentUser, room: currentPrivateRoom || 'general' });
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('typing_stop', { username: currentUser, room: currentPrivateRoom || 'general' });
            }, 1000);
        }

        function updateTypingIndicator(users) {
            const indicator = document.getElementById('typingIndicator');
            if (users.length > 0) {
                indicator.style.display = 'block';
                indicator.innerHTML = `✏️ ${users.join(', ')} ${users.length === 1 ? 'печатает' : 'печатают'}...`;
            } else {
                indicator.style.display = 'none';
            }
        }

        function addMessage(data) {
            const messagesDiv = document.getElementById('messages');
            const messageDiv = document.createElement('div');
            const isOwn = data.username === currentUser;
            let messageClass = 'message';
            if (data.type === 'system') messageClass += ' system';
            if (isOwn && data.type !== 'system') messageClass += ' own';
            messageDiv.className = messageClass;
            
            let content = '<div class="message-content">';
            content += '<div class="message-actions">';
            content += `<button class="action-btn" onclick="replyTo(${JSON.stringify(data).replace(/"/g, '&quot;')})">↩️ Ответить</button>`;
            content += `<button class="action-btn" onclick="pinMessage(${JSON.stringify(data).replace(/"/g, '&quot;')})">📌 Закрепить</button>`;
            content += '</div>';
            
            if (data.reply_to) {
                content += `<div class="reply-indicator">↩️ Ответ ${data.reply_to.username}: ${data.reply_to.message.substring(0,50)}</div>`;
            }
            
            if (data.type !== 'system') {
                content += `<div class="message-header"><span class="message-username">${data.isPrivate ? '🔒 ' : ''}${data.username}</span><span class="message-time">${data.timestamp}</span></div>`;
            }
            
            if (data.type === 'image' || (data.file_info && data.file_info.type === 'image')) {
                const imgSrc = data.message || `/uploads/${data.file_info?.saved_name}`;
                content += `<img class="message-image" src="${imgSrc}" style="max-width:200px; border-radius:10px; cursor:pointer;" onclick="window.open(this.src)">`;
            } else if (data.type === 'audio' || (data.file_info && data.file_info.type === 'audio')) {
                content += `<div class="audio-message"><audio controls src="/uploads/${data.file_info?.saved_name}"></audio></div>`;
            } else if (data.file_info && data.file_info.type === 'document') {
                content += `<div class="file-message" onclick="window.open('/download/${data.file_info.saved_name}')">📄 ${data.file_info.filename} (${(data.file_info.size/1024).toFixed(1)} KB)</div>`;
            } else {
                content += `<div class="message-text">${escapeHtml(data.message)}</div>`;
            }
            
            content += '</div>';
            messageDiv.innerHTML = content;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addSystemMessage(message) {
            addMessage({ username: 'Система', message: message, type: 'system' });
        }

        function addPinnedMessage(message) {
            const pinnedDiv = document.getElementById('pinnedMessages');
            pinnedDiv.style.display = 'block';
            const msgDiv = document.createElement('div');
            msgDiv.className = 'pinned-item';
            msgDiv.id = `pinned_${message.id}`;
            msgDiv.innerHTML = `
                <span>📌 <strong>${message.username}</strong>: ${message.message.substring(0,50)}</span>
                <button class="unpin-btn" onclick="unpinMessage('${message.id}')">✖️</button>
            `;
            pinnedDiv.appendChild(msgDiv);
        }

        function removePinnedMessage(messageId) {
            const elem = document.getElementById(`pinned_${messageId}`);
            if (elem) elem.remove();
            if (document.getElementById('pinnedMessages').children.length === 1) {
                document.getElementById('pinnedMessages').style.display = 'none';
            }
        }

        function unpinMessage(messageId) {
            socket.emit('unpin_message', { message_id: messageId, room: currentPrivateRoom || 'general' });
        }

        function updateUsersList(users) {
            const usersDiv = document.getElementById('users-list');
            usersDiv.innerHTML = '';
            users.forEach(user => {
                if (user !== currentUser) {
                    const userDiv = document.createElement('div');
                    userDiv.className = 'user-item';
                    userDiv.innerHTML = `
                        <div class="user-name"><span class="online-dot"></span><span>${escapeHtml(user)}</span><span id="unread_${user}" class="unread-badge" style="display:none;"></span></div>
                        <button class="invite-btn" onclick="inviteUser('${user}')">🎤 Пригласить</button>
                    `;
                    usersDiv.appendChild(userDiv);
                }
            });
        }

        function updateUnreadCounts(unread) {
            for (const [from, count] of Object.entries(unread)) {
                updateUnreadCountForUser(from, count);
            }
        }

        function updateUnreadCountForUser(from, count) {
            const badge = document.getElementById(`unread_${from}`);
            if (badge) {
                if (count > 0) {
                    badge.textContent = count;
                    badge.style.display = 'inline-block';
                } else {
                    badge.style.display = 'none';
                }
            }
            updateTitleUnread();
        }

        function updateTitleUnread() {
            let total = 0;
            document.querySelectorAll('.unread-badge').forEach(b => total += parseInt(b.textContent) || 0);
            document.title = total > 0 ? `(${total}) Мессенджер` : 'Мессенджер';
        }

        function inviteUser(username) {
            if (privateChatWith) { addSystemMessage('❌ Сначала выйдите из текущего разговора'); return; }
            socket.emit('invite_user', { inviter: currentUser, target: username });
        }

        function startPrivateChat(partner, room) {
            privateChatWith = partner;
            currentPrivateRoom = room;
            document.getElementById('chatTitle').innerHTML = `🔒 Приватный разговор с ${partner}`;
            document.getElementById('leavePrivateBtn').style.display = 'block';
            document.getElementById('messages').innerHTML = '';
        }

        function leavePrivateChat() {
            if (currentPrivateRoom) {
                socket.emit('leave_private_chat', { username: currentUser, room: currentPrivateRoom });
            }
        }

        function showCallNotification(from, room) {
            const notif = document.createElement('div');
            notif.className = 'call-notification';
            notif.innerHTML = `
                <h4>📞 Входящее приглашение</h4>
                <p><strong>${escapeHtml(from)}</strong> приглашает вас</p>
                <div class="call-buttons">
                    <button class="accept-btn" onclick="acceptCall('${from}', '${room}')">Принять</button>
                    <button class="decline-btn" onclick="declineCall('${from}')">Отклонить</button>
                </div>
            `;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 30000);
        }

        function acceptCall(from, room) {
            socket.emit('accept_call', { target: currentUser, inviter: from, room: room });
            document.querySelector('.call-notification')?.remove();
        }

        function declineCall(from) {
            socket.emit('decline_call', { target: currentUser, inviter: from });
            document.querySelector('.call-notification')?.remove();
        }

        function toggleEmojiPicker() {
            if (!emojiPicker) {
                emojiPicker = new EmojiMart.Picker({ onEmojiSelect: (emoji) => {
                    document.getElementById('message-input').value += emoji.native;
                    document.getElementById('emojiPicker').style.display = 'none';
                }});
                document.getElementById('emojiPicker').appendChild(emojiPicker);
            }
            const picker = document.getElementById('emojiPicker');
            picker.style.display = picker.style.display === 'none' ? 'block' : 'none';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
